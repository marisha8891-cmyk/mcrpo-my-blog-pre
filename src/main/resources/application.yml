spring:
  application:
    name: myblog-backend
  
  datasource:
    url: jdbc:h2:mem:blogdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      adjust-dates-to-context-time-zone: false

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    com.myblog: DEBUG
    org.springframework.jdbc: DEBUG